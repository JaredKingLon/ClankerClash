<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supabase Login</title>
<style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    #message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      background: #f59ddb;
    }
</style>
</head>
<body>
<h1>Sign up / Log in</h1>
 
  <input type="email" id="email" placeholder="Email" />
<input type="password" id="password" placeholder="Password" />
 
  <button id="signupBtn">Sign up</button>
<button id="loginBtn">Log in</button>
<button id="logoutBtn">Log out</button>
 
  <div id="message">Ready.</div>
 
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
 
       const supabaseUrl = 'https://jwlbcmapgdiljmgnqoxe.supabase.co'
      const supabaseAnonKey = 'sb_publishable_HsEO0dQTkP3HJAy80pfMqQ_EZRay4GJ'

 
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const message = document.getElementById('message')
 
    function showMessage(text) {
      message.textContent = text
    }
 
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = emailInput.value.trim()
      const password = passwordInput.value
 
      if (!email || !password) {
        showMessage('Please enter an email and password.')
        return
      }
 
      const { data, error } = await supabase.auth.signUp({
        email,
        password
      })
 
      if (error) {
        showMessage('Sign up error: ' + error.message)
        return
      }
 
      if (data.user) {
        showMessage('Account created. Check your email if confirmation is enabled.')
      } else {
        showMessage('Sign up complete.')
      }
    })
 
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = emailInput.value.trim()
      const password = passwordInput.value
 
      if (!email || !password) {
        showMessage('Please enter an email and password.')
        return
      }
 
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      })
 
      if (error) {
        showMessage('Login error: ' + error.message)
        return
      }
 
      showMessage('Logged in as: ' + data.user.email)
      console.log('Session:', data.session)
    })
 
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const { error } = await supabase.auth.signOut()
 
      if (error) {
        showMessage('Logout error: ' + error.message)
        return
      }
 
      showMessage('Logged out.')
    })
 
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      showMessage('Already logged in as: ' + session.user.email)
    }
 
    supabase.auth.onAuthStateChange((event, session) => {
      console.log('Auth event:', event, session)
    })
</script>
</body>
</html>
