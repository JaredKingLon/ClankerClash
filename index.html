<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supabase Login</title>
<style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    #message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      background: #f59ddb;
    }
</style>
</head>
<body>
<<input type="text" id="firstname" placeholder="First name" />
<input type="text" id="lastname" placeholder="Last name" />
<input type="password" id="password" placeholder="Password" />

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl = 'https://jwlbcmapgdiljmgnqoxe.supabase.co'
const supabaseAnonKey = 'sb_publishable_HsEO0dQTkP3HJAy80pfMqQ_EZRay4GJ'
const supabase = createClient(supabaseUrl, supabaseAnonKey)

const firstInput = document.getElementById('firstname')
const lastInput = document.getElementById('lastname')
const passwordInput = document.getElementById('password')
const message = document.getElementById('message')

function showMessage(text) {
  message.textContent = text
}

/* ---------------- SIGN UP ---------------- */
document.getElementById('signupBtn').addEventListener('click', async () => {
  const firstname = firstInput.value.trim()
  const lastname = lastInput.value.trim()
  const password = passwordInput.value

  if (!firstname || !lastname || !password) {
    showMessage('Please fill all fields.')
    return
  }

  // Supabase requires email → generate one
  const email = `${firstname}.${lastname}@example.com`.toLowerCase()

  /* 1. Create auth user */
  const { data, error } = await supabase.auth.signUp({
    email,
    password
  })

  if (error) {
    showMessage(error.message)
    return
  }

  const userId = data.user.id

  /* 2. Insert into YOUR table */
  const { error: insertError } = await supabase
    .from('students')
    .insert({
      id: userId,
      firstname,
      lastname
    })

  if (insertError) {
    showMessage(insertError.message)
    return
  }

  showMessage('Account created successfully.')
})

/* ---------------- LOGIN ---------------- */
document.getElementById('loginBtn').addEventListener('click', async () => {
  const firstname = firstInput.value.trim()
  const lastname = lastInput.value.trim()
  const password = passwordInput.value

  const email = `${firstname}.${lastname}@example.com`.toLowerCase()

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  })

  if (error) {
    showMessage(error.message)
    return
  }

  showMessage(`Logged in as ${firstname} ${lastname}`)
})

/* ---------------- LOGOUT ---------------- */
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut()
  showMessage('Logged out.')
})
</script>
``
</script>
</body>
</html>
